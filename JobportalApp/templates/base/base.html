<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
       <title>Dashboard | {{ user.display_name }}</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <style>
        body { background-color: #f8f9fa; }
        #wrapper { display: flex; width: 100%; align-items: stretch; }
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background: #212529; /* Dark Sidebar */
            color: #3e3d3d;
            transition: all 0.3s;
        }
        #sidebar .sidebar-header { padding: 20px; background: #1a1d20; border-bottom: 1px solid #343a40; }
        #sidebar ul.components { padding: 20px 0; }
        #sidebar ul li a {
            padding: 12px 20px;
            display: block;
            color: #adb5bd;
            text-decoration: none;
        }
        #sidebar ul li a:hover { color: #fff; background: #343a40; }
        #sidebar ul li.active > a { color: #fff; background: #0d6efd; } /* Primary Blue for active */
        #content { width: 100%; padding: 20px; }
    </style>
    </head>

    <body class="bg-black">
        <header>
            {% include "base/sidebar.html" %}
            
        </header>
        <main>
            {% block content %}{% endblock content %}
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
