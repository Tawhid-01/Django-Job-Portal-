<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <title>{% block title %}Dashboard{% endblock %} | JobPortal</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body { overflow-x: hidden; }
        #wrapper { display: flex; width: 100%; align-items: stretch; }
        #content {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            background-color: #121212; /* Darker background for content */
        }
        /* Sidebar Styling */
        #sidebar {
            min-width: 260px;
            max-width: 260px;
            background: #1a1d20;
            transition: all 0.3s;
        }
        .nav-link { color: #adb5bd !important; transition: 0.2s; }
        .nav-link:hover { color: #fff !important; background: #343a40; border-radius: 5px; }
        .nav-link.active { color: #fff !important; background: #0d6efd !important; border-radius: 5px; }
    </style>
</head>

<body>
    <div id="wrapper">
        <!-- Sidebar Inclusion -->
        {% include "base/sidebar.html" %}

        <!-- Page Content -->
        <div id="content">
            <header class="mb-4 border-bottom pb-3 d-flex justify-content-between align-items-center">
                <h2 class="h4">{{ title|default:"Welcome Back" }}</h2>
                <div class="user-info small text-secondary">
                    Logged in as: <span class="text-white fw-bold">{{ request.user.username }}</span>
                </div>
            </header>
            

            <main>
                {% block content %}{% endblock content %}
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
